<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proportion tests — practice</title>
<style>
:root{--paper:#f4ecde;--card:#fbf5ea;--ink:#3a3330;--ink2:#6b5f57;--muted:#8a8276;
 --sage:#5e9c7e;--sagef:#e6eee8;--rose:#c0695f;--rosef:#f1d9d2;--mustard:#cda75a;
 --mustf:#f3e9d2;--mustd:#9a7320;--blue:#4a6fa5;--bluef:#e1e8f0;--line:#d9cdb8;}
*{box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:Georgia,"Garamond","Times New Roman",serif;
 margin:0;padding:24px 14px;line-height:1.5;}
.wrap{max-width:680px;margin:0 auto;}
h1{font-size:22px;margin:0 0 4px;}
.sub{color:var(--ink2);font-size:14px;margin:0 0 16px;}
.barrow{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-size:13px;color:var(--ink2);}
.prog{flex:1;height:9px;background:#e7dcc6;border-radius:6px;overflow:hidden;}
.prog>div{height:100%;width:0;background:var(--sage);transition:width .3s;}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:18px 18px 16px;}
.tag{display:inline-block;font-size:12px;color:var(--mustd);background:var(--mustf);
 border:1px solid var(--mustard);border-radius:20px;padding:2px 10px;margin-bottom:10px;}
.scenario{font-size:15.5px;margin:0 0 12px;}
.scenario b{color:var(--ink);}
.qtext{font-weight:bold;font-size:15.5px;margin:12px 0 10px;}
svg{display:block;margin:6px auto 4px;max-width:100%;height:auto;}
.inrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0;}
input[type=number]{font-family:inherit;font-size:16px;padding:8px 10px;border:1.5px solid var(--line);
 border-radius:9px;width:130px;background:#fff;color:var(--ink);}
.mcq{display:flex;flex-direction:column;gap:8px;margin:8px 0;}
.mcq button{text-align:left;font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);
 border-radius:10px;background:#fff;color:var(--ink);cursor:pointer;}
.mcq button:hover{border-color:var(--sage);}
.mcq button.sel{border-color:var(--blue);background:var(--bluef);}
button.act{font-family:inherit;font-size:15px;font-weight:bold;padding:9px 16px;border-radius:10px;
 border:1.5px solid var(--sage);background:var(--sage);color:#fff;cursor:pointer;}
button.act:disabled{opacity:.45;cursor:default;}
button.ghost{font-family:inherit;font-size:14px;padding:9px 14px;border-radius:10px;
 border:1.5px solid var(--mustard);background:var(--mustf);color:var(--mustd);cursor:pointer;}
button.ghost:disabled{opacity:.4;cursor:default;}
.hints{margin:10px 0 0;padding:0;list-style:none;}
.hints li{background:var(--mustf);border-left:3px solid var(--mustard);border-radius:6px;
 padding:8px 11px;margin:6px 0;font-size:14px;color:var(--ink);}
.hints li code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:13.5px;}
.fb{margin:12px 0 0;padding:11px 13px;border-radius:10px;font-size:14.5px;display:none;}
.fb.ok{background:var(--sagef);border:1.5px solid var(--sage);color:#33604a;display:block;}
.fb.no{background:var(--rosef);border:1.5px solid var(--rose);color:#8c3b32;display:block;}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px;flex-wrap:wrap;}
.end{text-align:center;padding:26px 18px;}
.end .score{font-size:34px;color:var(--sage);font-weight:bold;}
.dot{color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Proportion tests — practice</h1>
  <p class="sub">z-test สำหรับสัดส่วน (one- &amp; two-sample) + effect size · ตอบให้ถูกในครั้งแรกโดยไม่เปิดคำใบ้ = ได้คะแนน</p>
  <div class="barrow">
    <span id="counter">ข้อ 1 / 5</span>
    <div class="prog"><div id="progfill"></div></div>
    <span id="score">คะแนน 0</span>
  </div>
  <div id="stage"></div>
</div>

<script>
"use strict";

// ---------- helper: build an SVG bell curve for a one-sample proportion ----------
function svgBell(p0, phat, opts){
  opts = opts || {};
  var W=340, H=158, padB=28, padT=26;
  var lo=p0-0.30, hi=p0+0.30;
  function mx(p){ return 14 + (p-lo)/(hi-lo)*(W-28); }
  var base=H-padB, amp=base-padT, cx=mx(p0), sd=(W-28)/9;
  var CURVE="#6ba088", REJ="#e6b0a7", P0L="#a99f8c", P0T="#6b5f57", PH="#d3a94f", PHT="#a5791d", AX="#a99f8c";
  var pts=[];
  for(var x=8;x<=W-8;x+=3){ var y=base-amp*Math.exp(-0.5*Math.pow((x-cx)/sd,2)); pts.push(x+","+y.toFixed(1)); }
  var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  if(opts.upperReject){
    var xc=cx+1.645*sd, poly="";
    for(var xx=xc;xx<=W-8;xx+=3){ var yy=base-amp*Math.exp(-0.5*Math.pow((xx-cx)/sd,2)); poly+=xx+","+yy.toFixed(1)+" "; }
    poly=xc+","+base+" "+poly+(W-8)+","+base;
    s+='<polygon points="'+poly+'" fill="'+REJ+'" fill-opacity="0.6"/>';
    s+='<line x1="'+xc+'" y1="'+padT+'" x2="'+xc+'" y2="'+base+'" stroke="'+REJ+'" stroke-width="1.3" stroke-dasharray="4 3"/>';
    s+='<text x="'+xc+'" y="'+(base-4)+'" fill="#c58a82" font-size="10.5" text-anchor="middle">reject zone</text>';
  }
  s+='<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+CURVE+'" stroke-width="2.6"/>';
  s+='<line x1="12" y1="'+base+'" x2="'+(W-12)+'" y2="'+base+'" stroke="'+AX+'" stroke-width="1"/>';
  s+='<line x1="'+cx+'" y1="'+padT+'" x2="'+cx+'" y2="'+base+'" stroke="'+P0L+'" stroke-width="1" stroke-dasharray="4 3"/>';
  s+='<text x="'+cx+'" y="'+(padT-9)+'" fill="'+P0T+'" font-size="12" text-anchor="middle">p&#8320; = '+p0+'</text>';
  var px=mx(phat), py=base-amp*Math.exp(-0.5*Math.pow((px-cx)/sd,2));
  s+='<line x1="'+px+'" y1="'+py.toFixed(1)+'" x2="'+px+'" y2="'+base+'" stroke="'+PH+'" stroke-width="2.6"/>';
  s+='<circle cx="'+px+'" cy="'+base+'" r="5" fill="'+PH+'"/>';
  s+='<text x="'+px+'" y="'+(base+17)+'" fill="'+PHT+'" font-size="12" text-anchor="middle" font-weight="bold">p&#770; = '+phat+'</text>';
  s+='</svg>';
  return s;
}

// ---------- helper: build an SVG bar chart ----------
function svgBars(bars, opts){
  opts=opts||{};
  var W=340,H=160,padB=30,padT=14,padL=34;
  var maxv=opts.max||1;
  var n=bars.length, gap=26, bw=(W-padL-16-gap*(n-1))/n, base=H-padB;
  var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  // threshold line
  if(opts.threshold!=null){
    var ty=base-(opts.threshold/maxv)*(base-padT);
    s+='<line x1="'+(padL-4)+'" y1="'+ty+'" x2="'+(W-8)+'" y2="'+ty+'" stroke="#c0695f" stroke-width="1.3" stroke-dasharray="5 3"/>';
    s+='<text x="'+(W-10)+'" y="'+(ty-4)+'" fill="#c0695f" font-size="11" text-anchor="end">'+opts.thresholdLabel+'</text>';
  }
  s+='<line x1="'+padL+'" y1="'+base+'" x2="'+(W-8)+'" y2="'+base+'" stroke="#6b5f57" stroke-width="1"/>';
  for(var i=0;i<n;i++){
    var x=padL+i*(bw+gap), h=(bars[i].value/maxv)*(base-padT), y=base-h;
    s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="4" fill="'+bars[i].color+'" stroke="'+bars[i].edge+'" stroke-width="1.3"/>';
    s+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-6).toFixed(1)+'" fill="'+bars[i].edge+'" font-size="13" text-anchor="middle" font-weight="bold">'+bars[i].top+'</text>';
    s+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(base+16)+'" fill="#3a3330" font-size="12" text-anchor="middle">'+bars[i].label+'</text>';
  }
  s+='</svg>';
  return s;
}

// ---------- item bank (all numbers verified) ----------
var ITEMS=[
 {
  tag:"One-sample z",
  scenario:"การทดลองวัคซีน: อัตรา seroconversion ที่คาดไว้ = <b>80%</b> (p&#8320;=0.80). ในกลุ่ม <b>n=150</b> พบ seroconversion <b>132 ราย</b>.",
  svg:svgBell(0.80,0.88),
  qtext:"คำนวณค่า z-statistic (ทศนิยม 2 ตำแหน่ง)",
  type:"numeric", answer:2.45, tol:0.05,
  hints:[
    "One-sample proportion test &mdash; SE ใช้ p&#8320; (ค่าใน H&#8320;) ไม่ใช่ p&#770;.",
    "สมการ: z = (p&#770; &#8722; p&#8320;) / &#8730;[p&#8320;(1&#8722;p&#8320;)/n]  (ใน Excel ใช้ SQRT สำหรับราก)",
    "หาค่าจากโจทย์เอง: p&#770; = จำนวนสำเร็จ &#247; n ; p&#8320; = อัตราที่คาดไว้ ; n = ขนาดตัวอย่าง",
    "เฉลย: z = <b>2.45</b>"
  ],
  explain:"p&#770;=0.88, SE=0.0327, z=2.45. เนื่องจาก 2.45 &gt; 1.96 &#8594; reject H&#8320; ที่ &#945;=0.05 (สองข้าง): อัตรา seroconversion สูงกว่า 80% อย่างมีนัยสำคัญ."
 },
 {
  tag:"One-sided decision",
  scenario:"ยาใหม่ต้องมี responder rate <b>เกินเกณฑ์ 60%</b> จึงจะผ่าน (H&#8320;: p &#8804; 0.60, H&#8226;: p &gt; 0.60). การทดสอบได้ <b>z = 2.24</b> ที่ &#945; = 0.05 <b>ทางเดียว</b>.",
  svg:svgBell(0.60,0.70,{upperReject:true}),
  qtext:"สรุปผลอย่างไร",
  type:"mcq",
  options:["Reject H&#8320; (responder rate สูงกว่า 60%)","Fail to reject H&#8320;"],
  answerIdx:0,
  hints:[
    "ทางเดียว (upper-tail): เทียบ z กับค่าวิกฤต &#8216;ค่าเดียว&#8217; (ไม่ใช่ &#177;).",
    "สมการหาค่าวิกฤต: z<sub>crit</sub> = NORM.S.INV(1 &#8722; &#945;) เมื่อ &#945; เป็นทางเดียว",
    "กฎ: reject เมื่อ z &gt; z<sub>crit</sub> &mdash; พิจารณาว่า z ที่ให้อยู่เกินหรือไม่",
    "เฉลย: z<sub>crit</sub> = +1.645 ; 2.24 &gt; 1.645 &#8594; <b>Reject H&#8320;</b>"
  ],
  explain:"ทางเดียวใช้ค่าวิกฤตค่าเดียว +1.645. เนื่องจาก 2.24 &gt; 1.645 &#8594; reject H&#8320;: มีหลักฐานว่า responder rate สูงกว่า 60%. (ต้องเลือกทิศ H&#8226; ก่อนเห็นข้อมูล)"
 },
 {
  tag:"Check the condition",
  scenario:"เหตุการณ์พบยาก: <b>n = 40</b>, อัตราที่คาดไว้ p&#8320; = <b>0.10</b>.",
  svg:svgBars([
     {label:"n&#183;p&#8320;",value:4,top:"4",color:"#f1d9d2",edge:"#c0695f"},
     {label:"n(1&#8722;p&#8320;)",value:36,top:"36",color:"#e6eee8",edge:"#5e9c7e"}
   ],{max:44,threshold:10,thresholdLabel:"&#8805; 10 needed"}),
  qtext:"z-test (normal approximation) ใช้ได้ในกรณีนี้ไหม",
  type:"mcq",
  options:["ใช้ได้","ใช้ไม่ได้ &#8594; ใช้ exact Binomial test แทน"],
  answerIdx:1,
  hints:[
    "เงื่อนไข normal approximation: n&#183;p&#8320; และ n(1&#8722;p&#8320;) ต้อง &#8805; ~10 ทั้งคู่.",
    "สมการ: คิด n&#183;p&#8320; และ n(1&#8722;p&#8320;) (แทน n, p&#8320; จากโจทย์)",
    "กฎ: ถ้าค่าใดค่าหนึ่ง &lt; 10 &#8594; เงื่อนไขไม่ผ่าน",
    "เฉลย: n&#183;p&#8320; = 4 &lt; 10 &#8594; ใช้ <b>exact Binomial test</b>"
  ],
  explain:"n&#183;p&#8320; = 4 &lt; 10 &#8594; การประมาณด้วย normal ไม่น่าเชื่อถือ. วิธีที่ถูกคือ exact Binomial test (ไม่ใช่สลับไป t)."
 },
 {
  tag:"Two-sample z",
  scenario:"เทียบอัตราหายของยา 2 ตัวใน RCT: ยาใหม่ <b>45/60 = 75%</b> vs มาตรฐาน <b>33/60 = 55%</b> (H&#8320;: p&#8321; = p&#8322;).",
  svg:svgBars([
     {label:"New",value:0.75,top:"75%",color:"#a6c3b1",edge:"#8aa896"},
     {label:"Standard",value:0.55,top:"55%",color:"#d9a39c",edge:"#c98b86"}
   ],{max:1}),
  qtext:"คำนวณค่า z-statistic (ทศนิยม 2 ตำแหน่ง)",
  type:"numeric", answer:2.30, tol:0.05,
  hints:[
    "Two-sample: ภายใต้ H&#8320; รวมเป็น pooled p&#770; ก่อน แล้วใช้ใน SE.",
    "สมการ: pooled p&#770; = (x&#8321;+x&#8322;)/(n&#8321;+n&#8322;) ; z = (p&#770;&#8321;&#8722;p&#770;&#8322;)/&#8730;[p&#770;(1&#8722;p&#770;)(1/n&#8321;+1/n&#8322;)]",
    "หาค่าเอง: p&#770;&#8321;, p&#770;&#8322; = สำเร็จ&#247;n ของแต่ละกลุ่ม ; pooled = รวมสำเร็จ &#247; รวม n",
    "เฉลย: z = <b>2.30</b>"
  ],
  explain:"pooled p&#770;=0.65, SE=0.0871, z=2.30 &gt; 1.96 &#8594; reject H&#8320;: อัตราหายต่างกันอย่างมีนัยสำคัญ."
 },
 {
  tag:"Effect size · NNT",
  scenario:"ในการทดลอง: อัตราเกิดเหตุการณ์ไม่พึงประสงค์ Control <b>25%</b> vs Treatment <b>15%</b>.",
  svg:svgBars([
     {label:"Control",value:0.25,top:"25%",color:"#d9a39c",edge:"#c98b86"},
     {label:"Treatment",value:0.15,top:"15%",color:"#a6c3b1",edge:"#8aa896"}
   ],{max:0.4}),
  qtext:"คำนวณ NNT (จำนวนเต็ม)",
  type:"numeric", answer:10, tol:0.5,
  hints:[
    "NNT = 1 / ARR ; ARR = ผลต่างอัตราเหตุการณ์ (สัมบูรณ์).",
    "สมการ: ARR = p<sub>control</sub> &#8722; p<sub>treatment</sub> ; NNT = 1 / ARR",
    "แทนค่า p<sub>control</sub>, p<sub>treatment</sub> จากโจทย์ แล้วคิด ARR ก่อน",
    "เฉลย: ARR = 0.10 &#8594; NNT = <b>10</b>"
  ],
  explain:"ARR = 0.10 &#8594; NNT = 10: ต้องรักษา 10 คนเพื่อป้องกันเหตุการณ์ไม่พึงประสงค์ 1 ราย. (รายงาน ARR/NNT คู่กับ RRR เสมอ)"
 }
];

// ---------- engine ----------
var cur=0, score=0, hintLevel=0, solved=false, sel=-1;

function el(id){ return document.getElementById(id); }

function renderItem(){
  hintLevel=0; solved=false; sel=-1;
  var it=ITEMS[cur];
  el("counter").textContent="ข้อ "+(cur+1)+" / "+ITEMS.length;
  el("progfill").style.width=(cur/ITEMS.length*100)+"%";
  el("score").textContent="คะแนน "+score;
  var html='<div class="card">';
  html+='<span class="tag">'+it.tag+'</span>';
  html+='<p class="scenario">'+it.scenario+'</p>';
  html+=it.svg;
  html+='<p class="qtext">'+it.qtext+'</p>';
  if(it.type==="numeric"){
    html+='<div class="inrow"><input type="number" id="ans" step="any" placeholder="พิมพ์คำตอบ"><button class="act" id="check">ตรวจ</button></div>';
  } else {
    html+='<div class="mcq" id="mcq">';
    for(var i=0;i<it.options.length;i++){ html+='<button data-i="'+i+'">'+it.options[i]+'</button>'; }
    html+='</div><div class="inrow"><button class="act" id="check" disabled>ตรวจ</button></div>';
  }
  html+='<ul class="hints" id="hints"></ul>';
  html+='<div class="fb" id="fb"></div>';
  html+='<div class="foot"><button class="ghost" id="hint">ขอคำใบ้</button><button class="act" id="next" style="display:none">ข้อถัดไป &#8594;</button></div>';
  html+='</div>';
  el("stage").innerHTML=html;

  if(it.type==="mcq"){
    var btns=el("mcq").querySelectorAll("button");
    btns.forEach(function(b){ b.onclick=function(){
      if(solved) return;
      btns.forEach(function(x){x.classList.remove("sel");});
      b.classList.add("sel"); sel=parseInt(b.getAttribute("data-i"),10);
      el("check").disabled=false;
    };});
  }
  el("check").onclick=check;
  el("hint").onclick=showHint;
  el("next").onclick=nextItem;
}

function showHint(){
  var it=ITEMS[cur];
  if(hintLevel>=it.hints.length){ return; }
  var li=document.createElement("li");
  var label=(hintLevel===it.hints.length-1)?"เฉลย: ":"คำใบ้ "+(hintLevel+1)+": ";
  li.innerHTML="<b>"+label+"</b>"+it.hints[hintLevel];
  el("hints").appendChild(li);
  hintLevel++;
  if(hintLevel>=it.hints.length){ el("hint").disabled=true; }
}

function check(){
  if(solved) return;
  var it=ITEMS[cur], correct=false;
  if(it.type==="numeric"){
    var v=parseFloat(el("ans").value);
    if(isNaN(v)){ return; }
    correct=Math.abs(v-it.answer)<=it.tol;
  } else {
    if(sel<0){ return; }
    correct=(sel===it.answerIdx);
  }
  var fb=el("fb");
  if(correct){
    solved=true;
    var gained=(hintLevel===0);
    if(gained){ score++; }
    fb.className="fb ok";
    fb.innerHTML="<b>ถูกต้อง!</b> "+it.explain+(gained?" <b>(+1 คะแนน)</b>":" (เปิดคำใบ้แล้ว จึงไม่ได้คะแนนข้อนี้)");
    el("check").disabled=true;
    el("hint").disabled=true;
    if(el("ans")) el("ans").disabled=true;
    if(el("mcq")) el("mcq").querySelectorAll("button").forEach(function(b){b.disabled=true;});
    el("next").style.display="inline-block";
    el("score").textContent="คะแนน "+score;
  } else {
    fb.className="fb no";
    fb.innerHTML="<b>ยังไม่ถูก</b> — ลองอีกครั้ง หรือกด &#8216;ขอคำใบ้&#8217;";
  }
}

function nextItem(){
  cur++;
  if(cur>=ITEMS.length){ renderEnd(); } else { renderItem(); }
}

function renderEnd(){
  el("counter").textContent="จบแล้ว";
  el("progfill").style.width="100%";
  el("score").textContent="คะแนน "+score;
  var msg = score===ITEMS.length ? "เยี่ยมมาก! ครบทุกข้อโดยไม่เปิดคำใบ้"
          : score>=Math.ceil(ITEMS.length*0.6) ? "ทำได้ดี — ทบทวนข้อที่เปิดคำใบ้อีกนิด"
          : "ลองอีกรอบเพื่อความมั่นใจ";
  el("stage").innerHTML='<div class="card end"><div class="score">'+score+' <span class="dot">/</span> '+ITEMS.length+'</div>'
    +'<p style="color:var(--ink2)">'+msg+'</p>'
    +'<button class="act" onclick="restart()">เริ่มใหม่</button></div>';
}

function restart(){ cur=0; score=0; renderItem(); }

renderItem();
</script>
</body>
</html>
