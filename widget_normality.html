function histSVG(counts,edges){
 const X0=40,X1=288,Y0=18,Y1=250,nb=counts.length,maxc=Math.max.apply(null,counts);
 const bw=(X1-X0)/nb; let bars="";
 for(let i=0;i<nb;i++){const h=maxc?counts[i]/maxc*(Y1-Y0):0,x=X0+i*bw,y=Y1-h;
   bars+=`<rect x="${(x+1).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-2).toFixed(1)}" height="${h.toFixed(1)}" fill="#8aa896" stroke="#5e9c7e" stroke-width="0.8"/>`;}
 const lab=(v,xx)=>`<text x="${xx}" y="${Y1+17}" text-anchor="middle" font-size="11" fill="#6b5f57">${v}</text>`;
 const mid=edges[Math.floor(edges.length/2)];
 return `<svg viewBox="0 0 300 275" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
   <line x1="${X0}" y1="${Y1}" x2="${X1}" y2="${Y1}" stroke="#d9cdb8" stroke-width="1.5"/>
   ${bars}${lab(edges[0],X0)}${lab(mid,(X0+X1)/2)}${lab(edges[edges.length-1],X1)}</svg>`;
}
function qqSVG(pts){
 const lo=-2.7,hi=2.7,X0=46,X1=286,Y0=16,Y1=250;
 const sx=v=>X0+(v-lo)/(hi-lo)*(X1-X0), sy=v=>Y1-(v-lo)/(hi-lo)*(Y1-Y0);
 let dots=pts.map(q=>`<circle cx="${sx(q[0]).toFixed(1)}" cy="${sy(q[1]).toFixed(1)}" r="3" fill="#4a6fa5" fill-opacity="0.85"/>`).join("");
 return `<svg viewBox="0 0 300 275" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
   <rect x="${X0}" y="${Y0}" width="${X1-X0}" height="${Y1-Y0}" fill="#fff" stroke="#d9cdb8"/>
   <line x1="${sx(lo)}" y1="${sy(lo)}" x2="${sx(hi)}" y2="${sy(hi)}" stroke="#5e9c7e" stroke-width="2" stroke-dasharray="5,4"/>${dots}
   <text x="${(X0+X1)/2}" y="268" text-anchor="middle" font-size="11" fill="#6b5f57">Theoretical quantiles</text></svg>`;
}

function render(){

 const pcls=p.p<0.05?'bad':'good', psign=p.p<0.05?'< 0.05':'> 0.05';
 const skcls=Math.abs(p.skew)>1?'warn':'';

   <div class="case"><b>กรณีศึกษา:</b> ${p.ctx} &nbsp;<i>(ตัวแปร: ${p.var})</i></div>
   <div class="charts">
     <div class="chart"><p class="t">Histogram</p>${histSVG(p.counts,p.edges)}</div>
     <div class="chart"><p class="t">Q-Q plot</p>${qqSVG(p.qpts)}</div>
   </div>
   <div class="stats">
     <span class="st">n = <b>${p.n}</b></span>
     <span class="st ${pcls}">Shapiro p = <b>${p.p}</b> (${psign})</span>
     <span class="st ${skcls}">skewness = <b>${p.skew}</b></span>
     <span class="st">kurtosis = <b>${p.kurt}</b></span>
   </div>
   <div class="guide">อ่านค่า: skew &gt; 0 เบ้ขวา, &lt; 0 เบ้ซ้าย, |skew| &gt; 1 เบ้มาก · kurtosis (ส่วนเกิน) &gt; 0 หางหนากว่าปกติ · SE ของ skew ≈ &radic;(6/n) — n เล็กยิ่งไม่แน่นอน</div>
   <p class="q">${p.q}</p>
   ${opts}<div id="why"></div>
   <div class="ctrl"><button class="act ghost" id="hintbtn" onclick="hint()">ขอคำใบ้</button><span id="nextslot"></span></div>`;
}

function pick(i){
 if(solved) return;
 const p=problems[idx], o=p.options[i], btn=document.getElementById('opt'+i);
 if(btn.disabled) return;
 const whybox=document.getElementById('why');
 if(o.ok){
   btn.classList.add('correct'); solved=true;
   if(!attempted && hintLevel===0) score++;
   document.getElementById('score').textContent=score;
   for(let k=0;k<p.options.length;k++) document.getElementById('opt'+k).disabled=true;
   whybox.innerHTML='<div class="why ok"><b>ถูกต้อง ✓</b></div>';
   const last=idx===problems.length-1;
   document.getElementById('nextslot').innerHTML='<button class="act primary" onclick="next()">'+(last?'ดูผลรวม':'ข้อถัดไป')+'</button>';
 } else {
   attempted=true; btn.classList.add('wrong'); btn.disabled=true;
   whybox.innerHTML=`<div class="why">✗ ${o.why}</div>`;
 }
}
function hint(){
 if(hintLevel>=2) return;
 if(hintLevel===0){hintsUsed++;document.getElementById('hused').textContent=hintsUsed;}
 hintLevel++;
 const tips=[
  "ดู 4 มุมประกอบกัน: <b>รูปร่าง</b> (Histogram สมมาตรไหม / Q-Q ตามเส้นไหม) + <b>ตัวเลข</b> (skew, kurt) + <b>test</b> (p) + <b>ขนาด n</b> — อย่าตัดสินจากมุมเดียว",
  "ระวัง: p &gt; 0.05 = ไม่ปฏิเสธ (ไม่ใช่พิสูจน์ว่าปกติ) · n เล็ก → test กำลังต่ำ + skew/kurt ไม่นิ่ง · n ใหญ่ → test ไวเกิน ให้ยึดรูปร่าง + ขนาดความเบ้เป็นหลัก"
 ];
 const d=document.createElement('div');d.className='hint';
 d.innerHTML='<b>คำใบ้ '+hintLevel+':</b> '+tips[hintLevel-1];
 document.getElementById('why').appendChild(d);
 if(hintLevel>=2) document.getElementById('hintbtn').disabled=true;
}
function next(){ if(idx===problems.length-1){end();return;} idx++; render(); }
function end(){
 document.getElementById('quiz').classList.add('hidden');
 document.getElementById('endcard').classList.remove('hidden');
 document.getElementById('final').textContent=score+' / '+problems.length;
 let m;
 if(score===problems.length) m='เต็ม! ตรวจความปกติแบบหลายมุมได้คมมาก';
 else if(score>=4) m='เก่งมาก ระวังกับดัก p>0.05 กับ n เล็ก';
 else if(score>=3) m='ทำได้ดี ทบทวนเรื่องกำลังการทดสอบกับ n';
 else m='ลองใหม่ — ยึดหลัก: ดูรูปร่าง + skew/kurt + p + n ประกอบกันเสมอ';
 document.getElementById('endmsg').textContent=m+' · ใช้คำใบ้ '+hintsUsed+' ครั้ง';
}
function restart(){idx=0;score=0;hintsUsed=0;
 document.getElementById('score').textContent=0;document.getElementById('hused').textContent=0;
 document.getElementById('endcard').classList.add('hidden');
 document.getElementById('quiz').classList.remove('hidden');render();}
render();
</script></body></html>
