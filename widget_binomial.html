<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Binomial distribution — กรณีศึกษา | Biostat WK02</title>
<style>
 :root{--paper:#f4ecde;--card:#fbf5ea;--ink:#3a3330;--ink2:#6b5f57;--muted:#8a8276;
  --sage:#5e9c7e;--sagef:#e6eee8;--rose:#c0695f;--rosef:#f1d9d2;--mustard:#cda75a;--mustf:#f3e9d2;--mustd:#9a7320;--blue:#4a6fa5;--bluef:#e1e8f0;--line:#d9cdb8;}
 *{box-sizing:border-box}
 body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,"Garamond","Times New Roman",serif;line-height:1.5;padding:24px 16px;display:flex;justify-content:center}
 .wrap{width:100%;max-width:700px}
 h1{font-size:22px;margin:0 0 4px}
 .sub{color:var(--ink2);font-size:14px;margin:0 0 16px;font-style:italic}
 .bar{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--ink2);margin-bottom:12px}
 .score b{color:var(--sage)}
 .card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:14px}
 .case{background:var(--bluef);border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:10px 14px;font-size:14.5px;margin-bottom:12px}
 .case b{color:var(--blue)}
 .chartbox{background:#fffdf8;border:1px solid var(--line);border-radius:10px;padding:8px 8px 2px;margin-bottom:6px}
 .chartbox svg{width:100%;height:auto;display:block}
 .ccap{font-size:12.5px;color:var(--ink2);text-align:center;margin:2px 0 8px}
 .params{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
 .pp{font-size:14px;background:#efe6d4;border-radius:14px;padding:3px 12px} .pp b{color:var(--ink)}
 .q{font-size:16px;font-weight:bold;margin:8px 0 10px}
 .inrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
 input[type=number]{font-family:inherit;font-size:17px;width:110px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
 input:focus{outline:none;border-color:var(--mustard)}
 button{font-family:inherit;font-size:15px;padding:9px 18px;border-radius:9px;cursor:pointer;border:1.5px solid var(--ink2);background:transparent;color:var(--ink);transition:.15s}
 button:hover{background:#efe6d4} button:disabled{opacity:.5;cursor:default}
 button.primary{background:var(--sage);border-color:var(--sage);color:#fff} button.primary:hover{background:#4f8a6e}
 button.ghost{border-color:var(--mustard);color:var(--mustd)} button.ghost:hover{background:var(--mustf)}
 .fb{margin-top:14px;font-size:15px;padding:12px 16px;border-radius:10px;display:none}
 .fb.ok{display:block;background:var(--sagef);border:1.5px solid var(--sage)} .fb.no{display:block;background:var(--rosef);border:1.5px solid var(--rose)}
 .fb.ok b{color:var(--sage)} .fb.no b{color:var(--rose)}
 .hints{margin-top:12px}
 .hint{background:var(--mustf);border-left:4px solid var(--mustard);border-radius:0 8px 8px 0;padding:9px 14px;margin-bottom:8px;font-size:14.5px}
 .hint code{font-family:"Courier New",monospace;background:#fff;padding:1px 5px;border-radius:4px}
 .ex{display:block;margin-top:4px;font-family:"Courier New",monospace;font-size:13px;color:var(--blue)}
 .sol{background:var(--sagef);border-left:4px solid var(--sage);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;font-size:15px}
 .actions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
 .done{text-align:center;padding:30px}.done .big{font-size:40px;color:var(--sage);margin:6px 0}
 .foot{font-size:12.5px;color:var(--muted);text-align:center;margin-top:18px}
 .hidden{display:none}
</style></head><body>
<div class="wrap">
 <h1>Binomial distribution — กรณีศึกษา</h1>
 <p class="sub">Widget · Week 2 · แท่งสีส้ม = ผลลัพธ์ที่โจทย์ถาม · ตอบแล้วตรวจทันที · คำใบ้มีสูตร Excel (BINOM.DIST)</p>
 <div class="bar"><span id="prog">ข้อ 1 / 5</span>
  <span class="score">คะแนน: <b id="score">0</b> / 5 &nbsp;·&nbsp; ใบ้: <span id="hused">0</span></span></div>
 <div id="quiz"><div class="card" id="qcard"></div></div>
 <div id="endcard" class="hidden"><div class="card done"><div>เสร็จแล้ว!</div>
  <div class="big" id="final">0 / 5</div><div id="endmsg" style="color:var(--ink2)"></div>
  <div style="margin-top:18px"><button class="primary" onclick="restart()">เริ่มใหม่</button></div></div></div>
 <p class="foot">binomial: n ครั้งที่อิสระกัน · 2 ผลลัพธ์ · p คงที่ · E(X)=np · SD=&radic;(np(1−p))</p>
</div>
<script>
const problems=[{"ctx": "ยาแก้ปวดชนิดหนึ่งได้ผลในผู้ป่วยประมาณ 70% ของผู้ที่ใช้ · แพทย์สั่งจ่ายให้ผู้ป่วย 6 คน", "q": "ความน่าจะเป็นที่ยาได้ผล “พอดี 4 คน” เท่ากับเท่าใด?", "kind": "exact", "n": 6, "p": 0.7, "k": 4, "ans": 32.4, "unit": "%", "mean": 4.2, "sd": 1.12, "bars": [{"k": 0, "pmf": 0.0007}, {"k": 1, "pmf": 0.0102}, {"k": 2, "pmf": 0.0595}, {"k": 3, "pmf": 0.1852}, {"k": 4, "pmf": 0.3241}, {"k": 5, "pmf": 0.3025}, {"k": 6, "pmf": 0.1176}], "hl": [4], "ask": "P(X = 4)", "formula": "=BINOM.DIST(4, 6, 0.7, FALSE)", "rule": "FALSE = ความน่าจะเป็น “พอดี k” (แท่งเดียวบนกราฟ)", "tol": 0.6}, {"ctx": "ในการทดลองยาตัวใหม่ ผู้ป่วยตอบสนองต่อยา (responder) 50% · ให้ยากับผู้ป่วย 10 คน", "q": "ความน่าจะเป็นที่มี responder “อย่างน้อย 7 คน”?", "kind": "geq", "n": 10, "p": 0.5, "k": 7, "ans": 17.2, "unit": "%", "mean": 5.0, "sd": 1.58, "bars": [{"k": 0, "pmf": 0.001}, {"k": 1, "pmf": 0.0098}, {"k": 2, "pmf": 0.0439}, {"k": 3, "pmf": 0.1172}, {"k": 4, "pmf": 0.2051}, {"k": 5, "pmf": 0.2461}, {"k": 6, "pmf": 0.2051}, {"k": 7, "pmf": 0.1172}, {"k": 8, "pmf": 0.0439}, {"k": 9, "pmf": 0.0098}, {"k": 10, "pmf": 0.001}], "hl": [7, 8, 9, 10], "ask": "P(X ≥ 7)", "formula": "=1 - BINOM.DIST(6, 10, 0.5, TRUE)", "rule": "P(X ≥ k) = 1 − P(X ≤ k−1) — เอา 1 ลบส่วนสะสมก่อนหน้า", "tol": 0.6}, {"ctx": "ผลข้างเคียง (คลื่นไส้) พบใน 20% ของผู้ที่ได้รับยา · ให้ยากับผู้ป่วย 50 คน", "q": "คาดว่าจะมีผู้เกิดผลข้างเคียง “เฉลี่ยกี่คน”?", "kind": "mean", "n": 50, "p": 0.2, "k": null, "ans": 10.0, "unit": "คน", "mean": 10.0, "sd": 2.83, "bars": [{"k": 0, "pmf": 0.0}, {"k": 1, "pmf": 0.0002}, {"k": 2, "pmf": 0.0011}, {"k": 3, "pmf": 0.0044}, {"k": 4, "pmf": 0.0128}, {"k": 5, "pmf": 0.0295}, {"k": 6, "pmf": 0.0554}, {"k": 7, "pmf": 0.087}, {"k": 8, "pmf": 0.1169}, {"k": 9, "pmf": 0.1364}, {"k": 10, "pmf": 0.1398}, {"k": 11, "pmf": 0.1271}, {"k": 12, "pmf": 0.1033}, {"k": 13, "pmf": 0.0755}, {"k": 14, "pmf": 0.0499}, {"k": 15, "pmf": 0.0299}, {"k": 16, "pmf": 0.0164}, {"k": 17, "pmf": 0.0082}, {"k": 18, "pmf": 0.0037}, {"k": 19, "pmf": 0.0016}, {"k": 20, "pmf": 0.0006}, {"k": 21, "pmf": 0.0002}, {"k": 22, "pmf": 0.0001}], "hl": [], "ask": "ค่าเฉลี่ย E(X)", "formula": "ค่าเฉลี่ย = n × p = 50 × 0.2", "rule": "binomial: E(X) = n · p (ไม่ต้องใช้ฟังก์ชันความน่าจะเป็น)", "tol": 0.5}, {"ctx": "อัตราการแพ้ยาปฏิชีวนะชนิดนี้ประมาณ 10% · ให้ยากับผู้ป่วย 15 คน", "q": "ความน่าจะเป็นที่มีผู้แพ้ยา “ไม่เกิน 1 คน”?", "kind": "leq", "n": 15, "p": 0.1, "k": 1, "ans": 54.9, "unit": "%", "mean": 1.5, "sd": 1.16, "bars": [{"k": 0, "pmf": 0.2059}, {"k": 1, "pmf": 0.3432}, {"k": 2, "pmf": 0.2669}, {"k": 3, "pmf": 0.1285}, {"k": 4, "pmf": 0.0428}, {"k": 5, "pmf": 0.0105}, {"k": 6, "pmf": 0.0019}, {"k": 7, "pmf": 0.0003}, {"k": 8, "pmf": 0.0}], "hl": [0, 1], "ask": "P(X ≤ 1)", "formula": "=BINOM.DIST(1, 15, 0.1, TRUE)", "rule": "TRUE = ความน่าจะเป็นสะสมตั้งแต่ 0 ถึง k (รวมแท่งซ้ายถึง k)", "tol": 0.6}, {"ctx": "ยาคุมกำเนิดมีโอกาสล้มเหลว 3% ต่อคนต่อปี · ผู้หญิง 20 คนใช้ต่อเนื่อง 1 ปี", "q": "ความน่าจะเป็นที่ “ไม่มีใครตั้งครรภ์เลย”?", "kind": "exact", "n": 20, "p": 0.03, "k": 0, "ans": 54.4, "unit": "%", "mean": 0.6, "sd": 0.76, "bars": [{"k": 0, "pmf": 0.5438}, {"k": 1, "pmf": 0.3364}, {"k": 2, "pmf": 0.0988}, {"k": 3, "pmf": 0.0183}, {"k": 4, "pmf": 0.0024}, {"k": 5, "pmf": 0.0002}], "hl": [0], "ask": "P(X = 0)", "formula": "=BINOM.DIST(0, 20, 0.03, FALSE)", "rule": "FALSE = ความน่าจะเป็น “พอดี k” (แท่งเดียวบนกราฟ)", "tol": 0.6}];
let idx=0,score=0,hintsUsed=0,hintLevel=0,solved=false;

function chartSVG(bars,hl,meanMark){
 const X0=42,X1=582,Y0=18,Y1=180,nb=bars.length,bw=(X1-X0)/nb;
 const maxp=Math.max.apply(null,bars.map(b=>b.pmf));
 let rects="",labels="";
 const showEvery = nb>16?2:1;
 for(let i=0;i<nb;i++){
   const b=bars[i], h=maxp?b.pmf/maxp*(Y1-Y0):0, x=X0+i*bw, y=Y1-h;
   const on=hl.indexOf(b.k)>=0;
   rects+=`<rect x="${(x+1.5).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-3).toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="${on?'#cda75a':'#8aa896'}" stroke="${on?'#9a7320':'#5e9c7e'}" stroke-width="0.8"/>`;
   if(i%showEvery===0) labels+=`<text x="${(x+bw/2).toFixed(1)}" y="${Y1+15}" text-anchor="middle" font-size="11" fill="#6b5f57">${b.k}</text>`;
 }
 let mline="";
 if(meanMark!=null){
   const i0=Math.floor(meanMark)-bars[0].k, frac=meanMark-Math.floor(meanMark);
   const mx=X0+(i0+frac+0.5)*bw;
   mline=`<line x1="${mx.toFixed(1)}" y1="${Y0-4}" x2="${mx.toFixed(1)}" y2="${Y1}" stroke="#c0695f" stroke-width="2" stroke-dasharray="5,4"/><text x="${mx.toFixed(1)}" y="${Y0-7}" text-anchor="middle" font-size="12" fill="#c0695f" font-weight="bold">mean</text>`;
 }
 return `<svg viewBox="0 0 600 205" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
   <line x1="${X0}" y1="${Y1}" x2="${X1}" y2="${Y1}" stroke="#d9cdb8" stroke-width="1.5"/>
   ${rects}${mline}${labels}
   <text x="${(X0+X1)/2}" y="200" text-anchor="middle" font-size="12" fill="#6b5f57">จำนวนที่เกิดเหตุการณ์ (k)</text></svg>`;
}

function render(){
 const p=problems[idx];
 document.getElementById('prog').textContent="ข้อ "+(idx+1)+" / "+problems.length;
 hintLevel=0;solved=false;
 const meanMark = p.kind==="mean"? p.mean : null;
 const askUnit = p.unit==="%" ? "ความน่าจะเป็น = " : "จำนวน (คน) = ";
 document.getElementById('qcard').innerHTML=`
   <div class="case"><b>กรณีศึกษา:</b> ${p.ctx}</div>
   <div class="chartbox">${chartSVG(p.bars,p.hl,meanMark)}</div>
   <p class="ccap">${p.kind==="mean"?"การแจกแจง binomial (เส้นประ = ค่าเฉลี่ย)":"แท่งสีส้ม = ผลลัพธ์ที่โจทย์ถาม"}</p>
   <div class="params"><span class="pp">n = <b>${p.n}</b></span><span class="pp">p = <b>${p.p}</b></span>
     <span class="pp">โจทย์ถาม <b>${p.ask}</b></span></div>
   <p class="q">${p.q}</p>
   <div class="inrow"><span>${askUnit}</span>
     <input type="number" id="ans" step="0.01" placeholder="?" autocomplete="off"><span>${p.unit}</span>
     <button class="primary" id="checkbtn" onclick="check()">ตรวจคำตอบ</button>
     <button class="ghost" id="hintbtn" onclick="hint()">ขอคำใบ้</button></div>
   <div class="fb" id="fb"></div><div class="hints" id="hints"></div><div class="actions" id="actions"></div>`;
 const inp=document.getElementById('ans');inp.focus();
 inp.addEventListener('keydown',e=>{if(e.key==='Enter')check();});
}

function check(){
 if(solved) return;
 const p=problems[idx], fb=document.getElementById('fb');
 const v=parseFloat(document.getElementById('ans').value);
 if(isNaN(v)){fb.className='fb no';fb.innerHTML='ลองใส่ตัวเลขก่อนนะ';return;}
 if(Math.abs(v-p.ans)<=p.tol){
   solved=true; if(hintLevel===0) score++;
   fb.className='fb ok';
   fb.innerHTML=`<b>ถูกต้อง!</b> คำตอบ &asymp; <b>${p.ans} ${p.unit}</b>`+(hintLevel>0?' <span style="color:var(--ink2)">(ใช้คำใบ้ ข้อนี้ไม่นับคะแนน)</span>':'');
   document.getElementById('score').textContent=score;
   document.getElementById('checkbtn').disabled=true; document.getElementById('hintbtn').disabled=true;
   showNext();
 } else {
   fb.className='fb no';
   const near=Math.abs(v-p.ans)<(p.unit==="%"?8:2);
   fb.innerHTML='<b>ยังไม่ใช่.</b> '+(near?'ใกล้แล้ว — เช็กการปัดเลขหรือชนิดสูตร (FALSE/TRUE)':'ลองดูคำใบ้แล้วคำนวณใหม่')+' &nbsp;<button class="ghost" onclick="hint()">ขอคำใบ้</button>';
 }
}

function hint(){
 const p=problems[idx];
 if(hintLevel===0){hintsUsed++;document.getElementById('hused').textContent=hintsUsed;}
 hintLevel++;
 const box=document.getElementById('hints');
 const steps=[
   `เป็น <b>binomial</b>: n = ${p.n} ครั้งที่อิสระกัน, แต่ละครั้งมี 2 ผลลัพธ์, p = ${p.p} คงที่ — โจทย์ถาม <b>${p.ask}</b>`,
   `ใช้ Excel <span class="ex">${p.formula}</span>`,
   p.rule
 ];
 if(hintLevel<=3){
   const d=document.createElement('div');d.className='hint';
   d.innerHTML='<b>คำใบ้ '+hintLevel+':</b> '+steps[hintLevel-1];
   box.appendChild(d);
 }
 if(hintLevel>=3){
   if(!document.getElementById('soln')){
     const s=document.createElement('div');s.id='soln';s.className='sol';
     s.innerHTML=`<b>เฉลย:</b> คำตอบ = <b>${p.ans} ${p.unit}</b> — พิมพ์ ${p.ans} เพื่อไปต่อ`;
     box.appendChild(s);
   }
   document.getElementById('hintbtn').disabled=true;
 }
}

function showNext(){
 const last=idx===problems.length-1;
 document.getElementById('actions').innerHTML='<button class="primary" onclick="next()">'+(last?'ดูผลรวม':'ข้อถัดไป')+'</button>';
}
function next(){ if(idx===problems.length-1){end();return;} idx++; render(); }
function end(){
 document.getElementById('quiz').classList.add('hidden');
 document.getElementById('endcard').classList.remove('hidden');
 document.getElementById('final').textContent=score+' / '+problems.length;
 let m;
 if(score===problems.length) m='เต็ม! เข้าใจ binomial ครบทั้งพอดี/สะสม/ค่าเฉลี่ย';
 else if(score>=4) m='เก่งมาก แม่นเรื่อง FALSE/TRUE ดี';
 else if(score>=3) m='ทำได้ดี ทบทวนความต่างของ “พอดี k / ไม่เกิน / อย่างน้อย”';
 else m='ลองใหม่ — จำ: FALSE=พอดี, TRUE=สะสม, ≥ ใช้ 1 − สะสมก่อนหน้า';
 document.getElementById('endmsg').textContent=m+' · ใช้คำใบ้ '+hintsUsed+' ครั้ง';
}
function restart(){idx=0;score=0;hintsUsed=0;
 document.getElementById('score').textContent=0;document.getElementById('hused').textContent=0;
 document.getElementById('endcard').classList.add('hidden');
 document.getElementById('quiz').classList.remove('hidden');render();}
render();
</script></body></html>
